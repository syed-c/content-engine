<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ContentEngine.ai</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#4723be",
                        "surface": "#fcf9f8",
                        "on-tertiary-fixed": "#1c0062",
                        "surface-container-high": "#ebe7e7",
                        "on-secondary-container": "#616363",
                        "on-surface-variant": "#444748",
                        "on-surface": "#1c1b1b",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#e5e2e1",
                        "on-background": "#1c1b1b",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#000000",
                        "on-secondary-fixed": "#1a1c1c",
                        "inverse-surface": "#313030",
                        "background": "#fcf9f8",
                        "tertiary-container": "#1c0062",
                        "surface-variant": "#e5e2e1",
                        "on-primary-fixed-variant": "#474646",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary-container": "#858383",
                        "surface-container-low": "#f6f3f2",
                        "secondary-fixed-dim": "#c6c6c7",
                        "tertiary-fixed": "#e6deff",
                        "surface-dim": "#dcd9d9",
                        "outline": "#747878",
                        "surface-tint": "#5f5e5e",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#866cfe",
                        "surface-container": "#f0edec",
                        "primary": "#000000",
                        "secondary-fixed": "#e2e2e2",
                        "on-secondary-fixed-variant": "#454747",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-container": "#1c1b1b",
                        "surface-bright": "#fcf9f8",
                        "surface-container-highest": "#e5e2e1",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#1c1b1b",
                        "secondary-container": "#dfe0e0",
                        "inverse-primary": "#c8c6c5",
                        "secondary": "#5d5f5f",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#c8c6c5",
                        "outline-variant": "#c4c7c7",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#cabeff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .glow-effect {
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
        }
        
        .input-glow:focus {
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03);
        }

        .floating-layer {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen selection:bg-black selection:text-white overflow-x-hidden">
<main class="flex-grow flex flex-col lg:flex-row relative">
<!-- Left Section: Bold Typography & Visual Anchor -->
<div class="w-full lg:w-1/2 flex flex-col justify-center px-8 lg:px-24 py-20 lg:py-0 bg-background z-10">
<div class="relative">
<!-- Animated Background Element (Minimalist) -->
<div class="absolute -top-24 -left-12 w-64 h-64 bg-surface-container-high rounded-full mix-blend-multiply opacity-30 blur-3xl floating-layer"></div>
<h1 class="text-7xl md:text-9xl font-headline font-extrabold tracking-[ -0.05em] leading-[0.85] mb-8 text-black">
                Access<br/>the<br/>Engine
            </h1>
<p class="text-on-surface-variant font-body text-xl max-w-md opacity-60 leading-relaxed">
                Log in to manage your programmatic SEO pipelines. A new era of content intelligence.
            </p>
<div class="mt-16 flex items-center gap-4 group cursor-default">
<div class="h-[2px] w-12 bg-black transition-all duration-500 group-hover:w-20"></div>
<span class="text-xs font-bold uppercase tracking-[0.2em] text-black">v2.0 Beta</span>
</div>
</div>
</div>
<!-- Right Section: Login Interface -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-6 lg:p-24 relative">
<!-- Floating Asymmetrical Card -->
<div class="w-full max-w-md relative">
<!-- Offset Shadow Layer for Depth -->
<div class="absolute inset-0 bg-black translate-x-4 translate-y-4 rounded-xl opacity-[0.03]"></div>
<div class="glass-card glow-effect p-10 lg:p-12 rounded-xl border border-white/40 shadow-2xl relative z-20">
<form class="space-y-10">
<!-- Email Field -->
<div class="space-y-3">
<label class="block font-label text-[10px] font-extrabold uppercase tracking-[0.2em] text-on-surface-variant/60" for="email">User Identification</label>
<input class="w-full bg-white border-2 border-black/5 focus:border-black rounded-none px-6 py-5 text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none input-glow font-medium" id="email" name="email" placeholder="EMAIL ADDRESS" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-3">
<div class="flex justify-between items-center">
<label class="block font-label text-[10px] font-extrabold uppercase tracking-[0.2em] text-on-surface-variant/60" for="password">Security Key</label>
</div>
<input class="w-full bg-white border-2 border-black/5 focus:border-black rounded-none px-6 py-5 text-on-surface placeholder:text-on-surface-variant/30 transition-all outline-none input-glow font-medium" id="password" name="password" placeholder="PASSWORD" type="password"/>
<div class="flex justify-end pt-1">
<a class="text-[10px] font-bold uppercase tracking-widest text-black/40 hover:text-black transition-colors duration-300 underline underline-offset-4" href="#">Recovery?</a>
</div>
</div>
<!-- Primary Action -->
<button class="group w-full bg-black text-white font-headline font-extrabold py-6 rounded-none tracking-widest uppercase text-sm hover:bg-zinc-800 active:scale-[0.98] transition-all duration-500 shadow-xl shadow-black/20 flex items-center justify-center gap-2" type="submit">
                        Initialize Session
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Bottom Navigation Context -->
<div class="mt-12 pt-10 border-t border-black/5 text-center">
<p class="text-on-surface-variant font-body text-xs tracking-tight">
                        Need access? 
                        <a class="font-black text-black hover:bg-black hover:text-white px-2 py-1 transition-all ml-1 border border-black" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Decorative Element: Intelligence Badge -->
<div class="absolute -bottom-8 -right-8 flex items-center gap-3 px-6 py-3 bg-white border border-black/5 shadow-lg rounded-full z-30">
<span class="material-symbols-outlined text-base text-black" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[9px] font-black uppercase tracking-[0.2em] text-black">Encrypted Node</span>
</div>
</div>
</div>
</main>
<!-- Footer: Shared Component -->
<footer class="w-full py-12 mt-auto bg-surface-container-low font-body text-sm border-t border-black/5">
<div class="flex flex-col md:flex-row justify-between items-center px-12 w-full">
<div class="mb-8 md:mb-0">
<span class="font-extrabold tracking-tighter text-black text-xl">ContentEngine.ai</span>
<p class="text-zinc-500 mt-2 text-xs font-medium">© 2024 CONTENT ENGINE AI INC. ALL RIGHTS RESERVED.</p>
</div>
<div class="flex flex-wrap justify-center gap-10">
<a class="text-zinc-500 text-xs font-bold uppercase tracking-widest hover:text-black transition-all duration-300" href="#">Privacy</a>
<a class="text-zinc-500 text-xs font-bold uppercase tracking-widest hover:text-black transition-all duration-300" href="#">Terms</a>
<a class="text-zinc-500 text-xs font-bold uppercase tracking-widest hover:text-black transition-all duration-300" href="#">Security</a>
<a class="text-zinc-500 text-xs font-bold uppercase tracking-widest hover:text-black transition-all duration-300" href="#">Status</a>
</div>
</div>
</footer>
</body></html>
